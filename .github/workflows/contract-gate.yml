# Xubb Agents — contract gate (see docs/PROCESS.md).
# Blocks merge on (a) a red suite and (b) any broken `covered` contract or
# malformed CONTRACTS.yaml. This is what makes the Contract Registry a HARD gate
# rather than an advisory document — the line the F-1 escape could not cross.
name: contract-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-gate:
    runs-on: ubuntu-latest
    # The repo root IS the `xubb_agents` package (pyproject package-dir maps it to ".").
    # pytest names that root package after the checkout directory, so the directory must
    # be a valid Python identifier. Check out into `xubb_agents` (not the default
    # `xubb-agents`, whose hyphen is not an importable module name) and run every step
    # from there — otherwise collection fails with "attempted relative import with no
    # known parent package".
    defaults:
      run:
        working-directory: xubb_agents
    steps:
      - uses: actions/checkout@v4
        with:
          path: xubb_agents

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Run the suite exactly once and emit a JUnit report; the gate consumes it
      # (no double execution).
      - name: Test suite (red-suite gate)
        run: pytest tests -q --junitxml=junit.xml

      - name: Contract gate (G1/G2/G3)
        run: python tools/check_contracts.py --junit junit.xml
