  - id: FACT-PRECEDENCE
    statement: >
      On a Fact (type, key) collision, higher agent PRIORITY wins; ties broken by higher
      confidence; remaining ties by later registration order.
    source:
      - "core/models.py: Fact docstring"
      - "docs/archive/SPEC_V2.md: §6.5.4"
      - "docs/SPEC_V2_2_HARDENING.md: INV-9 / §5"
      - "README.md: fact-precedence rule (~L526 / ~L870)"
    invariant: INV-9
    test: "tests/qa_probes/test_probe_f1_facts_priority.py::test_probe_f1_higher_priority_fact_wins_over_higher_confidence"
    test_engine: "tests/test_engine.py::TestMergeOrdering::test_priority_beats_confidence_on_facts"
    test_unit: "tests/test_blackboard.py::TestBlackboardFacts::test_higher_priority_wins_over_higher_confidence"
    status: covered   # v2.2 F-1 landed: Fact.priority + engine stamp + (priority,confidence) resolution.

  - id: FACT-DEDUP-KEY
    statement: >
      Facts dedupe by (type, key); when key is None, dedupe by type alone (the type is a
