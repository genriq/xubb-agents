    statement: "Each agent lifecycle callback fires at most once per execution attempt."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-1"]
    invariant: INV-1
    # Closest real, collectible node: asserts on_chain_error fires exactly once
    # (len(errors) == 1). Covers the on_chain_error path only, not every lifecycle
    # callback — bijection still to confirm in R1.
    test: "tests/test_engine.py::TestB5OnChainError::test_on_chain_error_fires_on_engine_failure"
    status: to_verify

  - id: INV-2-snapshot-isolation
