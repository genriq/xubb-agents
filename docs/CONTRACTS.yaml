# Xubb Agents — Contract Registry  (the contract-accuracy gate; see docs/PROCESS.md)
#
# Every documented behavioral contract MUST appear here and name a test that asserts the
# RULE (not just a happy-path example). The R1 checker `tools/check_contracts.py` will fail
# the build for any entry whose `test` is missing, does not exist, is skipped, or whose
# status is `uncovered`.
#
# This registry is the artifact that turns the F-1 escape ("a documented contract with no
# asserting test") into a day-one red build. It is seeded here (R0) from the existing
# invariants in SPEC_V2_1_HARDENING (INV-1..8) and SPEC_V2_2_HARDENING (INV-8'..13). The
# `to_verify` entries are honest debt for R1 (invariant↔test bijection back-fill); they are
# NOT claims of coverage.
#
# status vocabulary:
#   covered       — a test asserts the rule and passes; mapping verified.
#   to_verify     — a plausible test exists but the assertion/bijection is not yet verified
#                   (R1 back-fill). Treated as UNCOVERED by the gate until promoted.
#   failing_probe — the rule is documented by a probe that currently FAILS on `main`,
#                   making the gap visible (the contract is unimplemented). The probe is the
#                   permanent regression once the fix lands.
#   pending_v2.2  — a v2.2 hardening target not yet implemented; no passing test can exist
#                   yet. Becomes `covered` when the corresponding v2.2 item lands with its test.
#
# Each entry: id, statement, source[], invariant?, test, status.

schema_version: 1
baseline_commit: "47f742d"
seeded: "2026-06-08 (R0)"

# Debt ratchet: the gate fails if the number of to_verify/uncovered/pending entries
# exceeds this baseline. Debt may SHRINK (lower this when you promote an entry to
# covered) but never silently grow. Current debt: ZERO (fully certified).
debt_baseline: 0

contracts:

  # ---- The headline contract: the F-1 escape this whole registry exists to prevent ----
  - id: FACT-PRECEDENCE
    statement: >
      On a Fact (type, key) collision, higher agent PRIORITY wins; ties broken by higher
      confidence; remaining ties by later registration order.
    source:
      - "core/models.py: Fact docstring"
      - "docs/archive/SPEC_V2.md: §6.5.4"
      - "docs/SPEC_V2_2_HARDENING.md: INV-9 / §5"
      - "README.md: fact-precedence rule (~L526 / ~L870)"
    invariant: INV-9
    test: "tests/qa_probes/test_probe_f1_facts_priority.py::test_probe_f1_higher_priority_fact_wins_over_higher_confidence"
    test_engine: "tests/test_engine.py::TestMergeOrdering::test_priority_beats_confidence_on_facts"
    test_unit: "tests/test_blackboard.py::TestBlackboardFacts::test_higher_priority_wins_over_higher_confidence"
    status: covered   # v2.2 F-1 landed: Fact.priority + engine stamp + (priority,confidence) resolution.

  - id: FACT-DEDUP-KEY
    statement: >
      Facts dedupe by (type, key); when key is None, dedupe by type alone (the type is a
      singleton).
    source:
      - "core/blackboard.py: add_fact"
      - "docs/archive/SPEC_V2.md: §6.5.4"
    test: "tests/test_blackboard.py::TestBlackboardFacts::test_dedupe_by_type_key_pair"
    test_none_key: "tests/test_blackboard.py::TestBlackboardFacts::test_dedupe_none_key_by_type"
    status: covered   # (type,key) dedup + None-key-by-type singleton both asserted.

  # ---- v2.1 invariants (INV-1..8) — candidate tests exist; R1 verifies bijection ----
  - id: INV-1-callbacks-fire-once
    statement: "Each agent lifecycle callback fires at most once per execution attempt."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-1"]
    invariant: INV-1
    test: "tests/test_engine.py::TestCallbackInvariants::test_lifecycle_callbacks_fire_once"
    test_on_chain_error: "tests/test_engine.py::TestB5OnChainError::test_on_chain_error_fires_on_engine_failure"
    status: covered   # counting handler: turn_start/end + agent_start/finish each fire once.

  - id: INV-2-snapshot-isolation
    statement: "Snapshot state is immutable from the perspective of peer agents in the same phase."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-2"]
    invariant: INV-2
    test: "tests/test_engine.py::TestSnapshotIsolation::test_agents_see_snapshot"
    status: covered   # peers in a phase see the snapshot value; writes don't leak.

  - id: INV-3-explicit-identity
    statement: "Agent identity is explicit (source_agent_id), never inferred from payload content."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-3"]
    invariant: INV-3
    test: "tests/test_engine.py::TestB4MemoryUpdatesByAgent::test_memory_updates_by_agent_preserves_attribution"
    status: covered   # attribution keyed by agent_id, not inferred from payload.

  - id: INV-4-sys-keys-governed
    statement: "Reserved sys.* keys are engine-governed; unauthorized writes are detected/flagged."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-4"]
    invariant: INV-4
    test: "tests/test_blackboard.py::TestBlackboardVariables::test_unauthorized_sys_write_is_flagged"
    test_engine_sets: "tests/test_engine.py::TestProcessTurn::test_sys_variables_set"
    status: covered   # non-engine sys.* write is flagged (warning); engine writes aren't.

  - id: INV-5-tracing-never-crashes
    statement: "A serialization/tracing failure must never prevent insight delivery."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-5"]
    invariant: INV-5
    test: "tests/test_engine.py::TestCallbackInvariants::test_tracing_failure_does_not_block_insight_delivery"
    status: covered   # a broken tracer/callback can't block insight delivery (try/except-wrapped).

  - id: INV-6-graceful-degradation
    statement: "A failed agent must not produce orphaned side effects (atomic discard)."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-6"]
    invariant: INV-6
    test: "tests/test_engine.py::TestAtomicFailure::test_failed_agent_updates_discarded"
    status: covered   # T-3 strengthened: a failed agent's observable write never persists.

  - id: INV-7-callback-base-complete
    statement: "The callback base class defines all methods the engine calls; subclasses never crash."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-7"]
    invariant: INV-7
    test: "tests/test_engine.py::TestCallbackInvariants::test_noop_callback_subclass_survives_a_turn"
    status: covered   # a no-op AgentCallbackHandler subclass survives a full turn.

  - id: INV-8-memory-copy-on-read
    statement: "Agent memory values returned by the Blackboard are copies, not references."
    source: ["docs/archive/SPEC_V2_1_HARDENING.md: INV-8"]
    invariant: INV-8
    test: "tests/test_blackboard.py::TestBlackboardMemory::test_get_and_set_memory"
    test_copy: "tests/test_blackboard.py::TestBlackboardMemory::test_get_memory_returns_copy"
    status: covered   # copy-on-read asserted: mutating the returned value can't leak.

  # ---- v2.2 invariants (INV-8'..13) — pending the v2.2 hardening items ----
  - id: INV-8prime-memory-copy-on-write
    statement: "Memory values are copied on WRITE as well as read (set_memory/update_memory)."
    source: ["docs/SPEC_V2_2_HARDENING.md: INV-8'"]
    invariant: "INV-8'"
    test: "tests/test_blackboard.py::TestBlackboardMemory::test_update_memory_does_not_retain_caller_reference"
    status: covered   # v2.2 M-1 landed: set_memory/update_memory deep-copy on write.

  - id: INV-10-llm-time-bound
    statement: "Every external LLM call is time-bounded and fails with a typed, distinguishable outcome."
    source: ["docs/SPEC_V2_2_HARDENING.md: INV-10"]
    invariant: INV-10
    test: "tests/test_llm.py::test_typed_errors_return_none_and_log_category"
    status: covered   # v2.2 R-1 landed: timeout + bounded retries + max_tokens + typed errors.

  - id: INV-11-gateless-silence
    statement: "A gate-less schema follows the documented safe default; absence of a gate never forces speech."
    source: ["docs/SPEC_V2_2_HARDENING.md: INV-11"]
    invariant: INV-11
    test: "tests/test_dynamic_agent.py::TestGatelessSilenceContract::test_gateless_rootless_schema_stays_silent_by_default"
    status: covered   # v2.2 A-1 landed: gate-less+rootless schemas default to silence; load-time warning.

  - id: INV-12-context-mutation-restored
    statement: "Engine mutation of host-owned context (trigger_type, phase) is always restored, even on exception."
    source: ["docs/SPEC_V2_2_HARDENING.md: INV-12"]
    invariant: INV-12
    test: "tests/test_engine.py::TestE1Phase2ExceptionSafety::test_phase2_exception_restores_context_and_fires_on_chain_error"
    status: covered   # v2.2 E-1 landed: Phase-2 trigger_type/phase restored via try/finally.

  - id: INV-13-session-relative-timestamps
    statement: "Event/Fact timestamps follow the session-relative-seconds convention (no wall-clock epoch)."
    source: ["docs/SPEC_V2_2_HARDENING.md: INV-13"]
    invariant: INV-13
    test: "tests/test_dynamic_agent.py::TestSessionRelativeTimestamps::test_event_timestamp_is_session_relative_not_epoch"
    status: covered   # v2.2 A-2 landed: session-relative timestamps in DynamicAgent.

  - id: INV-14-memory-read-path
    statement: >
      Agent persistent memory committed to the blackboard is visible on the next turn's
      read-path (shared_state["memory_<id>"]) regardless of whether the agent instance is
      reused.
    source:
      - "core/engine.py: _sync_state_to_legacy (MR-1)"
      - "docs/SPEC_V2_2_HARDENING.md: Amendment 1 / INV-14"
    invariant: INV-14
    test: "tests/test_engine.py::TestV22Closeout::test_mr1_blackboard_memory_synced_to_shared_state"
    status: covered   # v2.2 MR-1 (Amendment 1): engine syncs blackboard.memory -> shared_state.

  # ---- L0 process gate (R1): the gate enforces its OWN contracts ----
  - id: REGISTRY-WELLFORMED
    statement: >
      The shipped CONTRACTS.yaml is structurally valid: unique ids, a valid status
      per entry, and every covered/to_verify/failing_probe entry names a test.
    source: ["docs/PROCESS.md: contract-accuracy gate", "tools/check_contracts.py: validate_registry"]
    test: "tests/test_check_contracts.py::TestWellformed::test_real_registry_is_wellformed"
    status: covered   # R1: check_contracts.py validate_registry guards this on every run.

  - id: GATE-INFRASTRUCTURE
    statement: >
      The contract gate fails the build for any `covered` contract whose named test
      is missing, skipped, or failing (G1/G3); a passing test is required.
    source: ["docs/PROCESS.md: negative controls", "tools/check_contracts.py: evaluate"]
    invariant: G1
    test: "tests/test_check_contracts.py::TestGate::test_gate_fails_on_uncovered_contract"
    status: covered   # R1: tools/check_contracts.py landed (L0).

  - id: CONTRACT-BIJECTION
    statement: >
      Every `covered` contract maps to a test that exists, is not skipped, and
      passes; skipped/failed/missing all hard-fail the gate (G2 bijection).
    source: ["docs/PROCESS.md: contract-test bijection", "tools/check_contracts.py: evaluate"]
    invariant: G2
    test: "tests/test_check_contracts.py::TestGate::test_contract_test_bijection"
    status: covered   # R1.

  - id: RELEASE-GATE-CI
    statement: >
      A CI workflow runs tools/check_contracts.py so a broken covered contract or a
      malformed registry blocks merge (the gate is enforced, not advisory).
    source: ["docs/PROCESS.md: CI enforcement", ".github/workflows/contract-gate.yml"]
    test: "tests/test_check_contracts.py::TestReleaseGateCI::test_ci_workflow_exists_and_invokes_gate"
    status: covered   # R1.

  - id: AGENT-REGISTRY-ATOMIC-SWAP
    statement: >
      AgentEngine.replace_agents() swaps the full registry atomically: a concurrent
      turn iterating self.agents (or reading _agent_meta) never observes a
      half-cleared registry. The three structures (agents, _agent_index, _agent_meta)
      are rebuilt fresh and rebound (agents last) — never mutated in place — so a
      reader sees a complete old or complete new set, with no stale-meta leak.
    source:
      - "core/engine.py: replace_agents"
    test: "tests/test_engine.py::TestReplaceAgents::test_replace_agents_swaps_registry_and_clears_stale_meta"
    test_concurrent: "tests/test_engine.py::TestReplaceAgents::test_replace_agents_never_observed_half_cleared"
    status: covered   # guards hosts that hot-reload the agent registry during a live turn.

  - id: INTERVAL-CONFIG-PARSED
    statement: >
      DynamicAgent parses trigger_config.trigger_interval into
      AgentConfig.trigger_interval (int-coerced; non-numeric/non-positive values are
      warned and treated as absent). Previously never read, so an interval-mode
      vault agent could never fire — the host gates on `if interval and ...`.
    source:
      - "library/dynamic.py: __init__ (trigger_interval parse)"
    invariant: CFG-INTERVAL
    test: "tests/test_dynamic_agent.py::TestIntervalTriggerConfig::test_trigger_interval_is_parsed_into_config"
    test_coerce: "tests/test_dynamic_agent.py::TestIntervalTriggerConfig::test_numeric_string_interval_is_coerced"
    test_invalid: "tests/test_dynamic_agent.py::TestIntervalTriggerConfig::test_invalid_interval_treated_as_absent_with_warning"
    test_absent: "tests/test_dynamic_agent.py::TestIntervalTriggerConfig::test_absent_interval_stays_none"
    status: covered   # interval-mode agents defined via host config now actually fire.

  - id: CONDITIONS-FAIL-CLOSED
    statement: >
      The condition evaluator NEVER fails open. Rule-level errors return False
      (evaluation never raises); an unknown operator returns False with a
      warning; and (v2.2.1) an unknown `mode` returns False with a warning
      instead of the historical fall-through `return True`. The only sanctioned
      always-run paths are conditions=None/empty and rules=[] (absent gating is
      a deliberate default, not a failure).
    source:
      - "core/conditions.py: evaluate (mode dispatch + unknown-mode fail-closed)"
      - "core/conditions.py: _evaluate_rule (never-raises except)"
      - "core/conditions.py: _compare (unknown-operator fail-closed)"
    invariant: EVAL-FAIL-CLOSED
    test: "tests/test_conditions.py::TestHardeningV22::test_c4_unknown_mode_fails_closed"
    test_operator: "tests/test_conditions.py::TestHardeningV22::test_c1_unknown_operator_fails_closed"
    test_known_modes: "tests/test_conditions.py::TestHardeningV22::test_c4_known_modes_unaffected"
    status: covered   # v2.2.1: closes the last fail-open edge before P1 authoring begins.

  - id: CASCADE-SINGLE-HOP
    statement: >
      Event cascades are single-hop by construction: Phase-2 agents are the
      subscribers of Phase-1 events and run within the same turn; events
      emitted IN Phase 2 are recorded but never dispatched, and max_phases is
      hard-clamped to [1, 2]. No authored prompt set can create multi-hop or
      unbounded cascade chains.
    source:
      - "core/engine.py: process_turn (Phase-2 gate + subscriber resolution)"
      - "core/engine.py: Phase-2 event recording (not dispatched)"
      - "core/engine.py: max_phases clamp"
    invariant: CASCADE-BOUNDED
    test: "tests/test_engine.py::TestMultiPhaseExecution::test_phase2_events_not_dispatched"
    test_clamp: "tests/test_engine.py::TestV22Closeout::test_e7_max_phases_clamped"
    status: covered   # Registered v2.2.1: behavior existed and was tested, but had no registry entry.

