  - id: AGENT-REGISTRY-ATOMIC-SWAP
    statement: >
      AgentEngine.replace_agents() swaps the full registry atomically: a concurrent
      turn iterating self.agents (or reading _agent_meta) never observes a
      half-cleared registry. The three structures (agents, _agent_index, _agent_meta)
      are rebuilt fresh and rebound (agents last) — never mutated in place — so a
      reader sees a complete old or complete new set, with no stale-meta leak.
    source:
      - "core/engine.py: replace_agents"
    test: "tests/test_engine.py::TestReplaceAgents::test_replace_agents_swaps_registry_and_clears_stale_meta"
    test_concurrent: "tests/test_engine.py::TestReplaceAgents::test_replace_agents_never_observed_half_cleared"
    status: covered   # guards hosts that hot-reload the agent registry during a live turn.

  - id: AGENT-REGISTRY-MUTATORS-CONSISTENT
    statement: >
      Every registry mutator holds _agents_lock and rebinds fresh structures rather
      than mutating in place, matching replace_agents: register_agent and
      unregister_agent rebuild agents/_agent_index/_agent_meta and rebind them, so a
      lock-free reader (a turn iterating self.agents, possibly on another thread during
      a vault reload) always sees a complete registry. unregister_agent also EXISTS and
      is symmetric with register_agent (the host's test-agent cleanup depends on it).
    source:
      - "core/engine.py: register_agent (rebind under lock)"
      - "core/engine.py: unregister_agent (rebind under lock; recomputes indices)"
    test: "tests/test_registry_mutators.py::test_register_rebinds_rather_than_mutating"
    test_unregister: "tests/test_registry_mutators.py::test_unregister_agent_removes_and_reports"
    test_unregister_rebinds: "tests/test_registry_mutators.py::test_unregister_rebinds_rather_than_mutating"
    status: covered   # extends AGENT-REGISTRY-ATOMIC-SWAP to the incremental mutators.

